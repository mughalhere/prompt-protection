name: Publish to npm

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify npm token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::Repository secret NPM_TOKEN is not set. Add an npm automation or granular token with publish access."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run prepublishOnly

      # Requires the package to be linked for provenance on npm (Trusted Publishers).
      # If publish fails here, run: npm publish --access public without --provenance locally, or configure the link at npmjs.com.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
