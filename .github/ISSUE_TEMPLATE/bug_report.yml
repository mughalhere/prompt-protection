name: Bug Report
description: Something is broken or behaving incorrectly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "verifyPrompt() did not throw for a prompt that should be blocked."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste the smallest code snippet that reproduces the issue.
      render: typescript
      placeholder: |
        import { verifyPrompt } from 'prompt-protection';
        verifyPrompt('...');
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "verifyPrompt() should have thrown PromptInjectionError."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "No error was thrown. Score was 0."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node.js
        - Browser
        - Both
    validations:
      required: true
